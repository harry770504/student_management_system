{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Add Marks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        select,
        input,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
            box-sizing: border-box;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .success {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Student Marks</h2>

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <select name="student" required>
            <option value="">Select Student</option>
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.full_name }}</option>
            {% endfor %}
        </select>

        <select name="subject" required>
            <option value="">Select Subject</option>
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
            {% endfor %}
        </select>

        <input type="text" name="exam_type" placeholder="Exam Type (e.g. Midterm)" required>
        <input type="number" step="0.01" name="marks_obtained" placeholder="Marks Obtained" required>
        <input type="number" step="0.01" name="total_marks" placeholder="Total Marks" required>

        <button type="submit">Save Marks</button>
    </form>
</div>

</body>
</html>
